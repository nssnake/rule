[custom]
; ================================
; 精简后的自定义规则（满足地区分组自动测速 + AI/Nintendo 分流）
; ================================

; ---------- 规则集 ----------
; 直连列表（国内域名、局域网、Steam中国等）
ruleset=🎯 全球直连,https://raw.githubusercontent.com/nssnake/rule/refs/heads/main/Direct.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/China/China.list
ruleset=🎯 全球直连,[]GEOSITE,CN
ruleset=🎯 全球直连,[]GEOIP,CN

; 代理常用境外域名（GFWlist、ProxyLite等）
ruleset=🚀 节点选择,https://raw.githubusercontent.com/nssnake/rule/refs/heads/main/ProxyLite.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list

; 流媒体及 AI
ruleset=🎥 Netflix,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Netflix.list
ruleset=📹 YouTube,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.list
ruleset=🤖 AI,https://raw.githubusercontent.com/nssnake/rule/refs/heads/main/AI.list

; 内联直连规则（bilibili/steam/deepseek/wise 强制直连）
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,bilibili.com
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,bilivideo.com
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,steamcommunity.com
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,steampowered.com
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,steamstatic.com
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,deepseek.com
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,wise.com

; 最后的兜底规则
ruleset=🐟 漏网之鱼,[]FINAL


; ---------- 策略组定义 ----------
; 地区分组（自动测速，延迟最低）
custom_proxy_group=🇭🇰 香港节点`url-test`(?=.*(香港|HK|Hong Kong|🇭🇰|HongKong))^((?!(深港|家宽|游戏|剩余|流量|2.0|2倍|2x|3.0|3倍|3x|4.0|4倍|4x)).)*$`http://www.gstatic.com/generate_204`600`50
custom_proxy_group=🇯🇵 日本节点`url-test`(?=.*(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan))^((?!(家宽|游戏|剩余|流量|2.0|2倍|2x|3.0|3倍|3x|4.0|4倍|4x)).)*$`http://www.gstatic.com/generate_204`600`50
custom_proxy_group=🇸🇬 加坡节点`url-test`(?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(家宽|游戏|剩余|流量|2.0|2倍|2x|3.0|3倍|3x|4.0|4倍|4x)).)*$`http://www.gstatic.com/generate_204`600`50
custom_proxy_group=🇺🇲 美国节点`url-test`(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States)`http://www.gstatic.com/generate_204`600`50

; 全局自动选择（所有节点）
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`600`50

; 手动切换组（用于列出所有节点）
custom_proxy_group=🐸 手动切换`select`.*

; AI 服务（手动选择地区）
custom_proxy_group=🤖 AI`select`[]🇺🇲 美国节点`[]🇯🇵 日本节点`[]🇸🇬 加坡节点`[]🇭🇰 香港节点`[]♻️ 自动选择`[]🐸 手动切换

; Nintendo 服务（手动选择地区）
custom_proxy_group=🎮 Nintendo`select`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇸🇬 加坡节点`[]♻️ 自动选择`[]🐸 手动切换

; 主策略组（良心云风格，只引用地区组）
custom_proxy_group=🌍 良心云`select`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 加坡节点`[]🇺🇲 美国节点`[]♻️ 自动选择`[]🐸 手动切换

; 其他常用分组（可保留或删除）
custom_proxy_group=📹 YouTube`select`[]🌍 良心云`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 加坡节点`[]🇺🇲 美国节点`[]♻️ 自动选择`[]🐸 手动切换
custom_proxy_group=🎥 Netflix`select`[]🌍 良心云`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 加坡节点`[]🇺🇲 美国节点`[]🎥 奈飞节点`[]♻️ 自动选择
custom_proxy_group=🎵 TikTok`select`[]🌍 良心云`[]🇯🇵 日本节点`[]🇸🇬 加坡节点`[]🇺🇲 美国节点`[]🐸 手动切换
custom_proxy_group=📲 Telegram`select`[]🌍 良心云`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇸🇬 加坡节点`[]🐸 手动切换

; Netflix 解锁专用节点组
custom_proxy_group=🎥 奈飞节点`select`(NF|奈飞|解锁|Netflix|NETFLIX|Media)

; 直连组（手动）
custom_proxy_group=🎯 全球直连`select`[]DIRECT

; 漏网之鱼（最终兜底策略）
custom_proxy_group=🐟 漏网之鱼`select`[]🌍 良心云`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇸🇬 加坡节点`[]♻️ 自动选择`[]🐸 手动切换`[]DIRECT

; ---------- 启用配置 ----------
enable_rule_generator=true
overwrite_original_rules=true